name: Link checker

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Wednesdays at 12:00 UTC — catches link rot on the published site.
    - cron: '0 12 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan the built site, not the source. Catches both authored
          # links and ones the templates emit (canonical, OG, RSS, etc.).
          args: |
            --no-progress
            --max-redirects 5
            --max-concurrency 8
            --accept 200,201,202,204,301,302,403,429
            --exclude-path 'dist/og'
            --exclude 'localhost'
            --exclude 'plausible.io'
            --exclude 'statcounter.com'
            --exclude 'arxiv.org/abs/2410.05435'
            './dist/**/*.html'
            './dist/rss.xml'
          fail: false
          format: markdown
          output: ./lychee/out.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md

      - name: Open issue on failure (main branch only)
        if: ${{ failure() && github.event_name == 'schedule' && github.ref == 'refs/heads/main' }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link checker found broken links'
          content-filepath: ./lychee/out.md
          labels: link-rot
