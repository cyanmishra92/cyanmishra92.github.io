name: Deploy to GitHub Pages

# Deploy ordering: this workflow waits behind the four generators
# (blog-audio, citations-stamp, photo-exif, photo-optim) so the site
# never ships ahead of their output. Two mechanisms working together:
#
#   1. `paths-ignore` on the push trigger lists every INPUT and OUTPUT
#      path of those generators. When the user pushes a change that
#      only touches those paths, deploy does NOT fire from the push —
#      it lets the generator workflow run alone. When the generator
#      auto-commits its output (which also lives in paths-ignore),
#      that bot push is suppressed too. Deploy fires from the
#      workflow_run trigger below instead.
#
#   2. `workflow_run` fires deploy when any of the generators
#      completes (success or failure — the generators are fail-soft,
#      so even a logged-warning run should publish whatever did
#      generate). This covers the cache-hit case too, where the
#      generator finishes without an auto-commit but the user still
#      expects their content change to roll out.
#
# Pushes that DON'T match paths-ignore (CSS, components, layouts,
# everything else) fire deploy directly via push as before.
on:
  push:
    branches: [main]
    paths-ignore:
      # blog-audio inputs + outputs
      - 'src/content/blog/**'
      - 'scripts/blog-audio/**'
      - 'src/data/blog-audio.json'
      - 'public/audio/**'
      # citations-stamp input/output (same file)
      - 'src/data/citations-source.json'
      # photos generators — img/** is both input and output
      - 'src/content/photos/img/**'
      - 'scripts/extract-photo-exif.ts'
      - 'scripts/optimize-photos.ts'
  workflow_run:
    workflows:
      - 'Blog audio — generate'
      - 'Citations — auto-stamp dates'
      - 'Photos — extract EXIF'
      - 'Photos — optimise sources'
    types: [completed]
    branches: [main]
  # Daily rebuild at 06:30 UTC so the GitHub stats card stays current
  # (citation counts come from the manually-synced
  # src/data/citations-source.json file directly; no fetch step needed).
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Citation counts are sourced from src/data/citations-source.json
      # (manually synced from Google Scholar — see docs/CITATIONS.md).
      # Drift vs external APIs is checked weekly via citation-drift.yml.
      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.PUBLIC_PLAUSIBLE_DOMAIN }}
          PUBLIC_FORMSPREE_ENDPOINT: ${{ vars.PUBLIC_FORMSPREE_ENDPOINT }}
          # Search engine ownership tokens. Set as repo Variables (not
          # Secrets) — they're publicly visible in rendered HTML anyway,
          # and Variables can be referenced from build steps. See docs/SEO.md.
          PUBLIC_GSC_VERIFICATION: ${{ vars.PUBLIC_GSC_VERIFICATION }}
          PUBLIC_BING_VERIFICATION: ${{ vars.PUBLIC_BING_VERIFICATION }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
