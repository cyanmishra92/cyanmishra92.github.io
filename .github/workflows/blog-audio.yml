name: Blog audio — generate

# Phase 8.2 — for every published blog post, generate an MP3 narration
# via OpenAI tts-1-hd, store it on Cloudflare R2, and commit the
# slug → metadata map to src/data/blog-audio.json.
#
# Triggers:
#   - push to main, when blog content or audio scripts change
#   - workflow_dispatch (optional `slug` input to regenerate one post,
#     `force` to bypass the hash cache)
#
# The generator is fail-soft: missing Secrets, OpenAI errors, and R2
# upload failures all log and skip rather than failing the workflow.
# A deploy with no audio is a worse outcome than a working text post,
# so we never block on TTS.
#
# Loop guard: the auto-commit message ends with "[skip ci]" so it
# does NOT re-trigger this workflow or the deploy workflow.

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'scripts/blog-audio/**'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Optional: regenerate one post by slug'
        required: false
      force:
        description: 'Force regeneration even if hash unchanged'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: blog-audio
  cancel-in-progress: false

jobs:
  generate:
    name: Generate audio for published posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate audio
        run: npx tsx scripts/blog-audio/generate.ts
        env:
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
          ONLY_SLUG:             ${{ github.event.inputs.slug }}
          FORCE_REGEN:           ${{ github.event.inputs.force }}

      - name: Commit blog-audio.json if changed
        run: |
          if [[ -z "$(git status --porcelain src/data/blog-audio.json)" ]]; then
            echo "no audio metadata changes to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/blog-audio.json
          git commit -m "chore(audio): update blog-audio.json [skip ci]"
          git push
